{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TODO APP{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
    <div class="background-orb orb-one"></div>
    <div class="background-orb orb-two"></div>
    <div class="page-shell">
        <header class="site-header panel">
            <a class="brand" href="{% url 'landing' %}">
                <span class="brand-mark">TA</span>
                <span>TODO APP</span>
            </a>
            <nav class="site-nav">
                {% if user.is_authenticated %}
                    <a href="{% url 'todo-list' %}">My Tasks</a>
                    <a class="button secondary small" href="{% url 'todo-create' %}">New Task</a>
                    <form method="post" action="{% url 'logout' %}" class="inline-form">
                        {% csrf_token %}
                        <button type="submit" class="ghost-button">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a class="button secondary small" href="{% url 'signup' %}">Register</a>
                {% endif %}
            </nav>
        </header>

        {% if messages %}
            <section class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags|default:'info' }}">{{ message }}</div>
                {% endfor %}
            </section>
        {% endif %}

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
